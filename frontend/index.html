<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>ABC</title>
</head>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

<header>
    <div class="container-fluid bg-primary text-white">
        <div class="row p-4 align-items-center">
            <img src="images/ABCLogo.png" class="img-thumbnail rounded col-sm-2" style="max-width: 100px;">
            <h2 class="col-lg-9">ABC Company</h2>
            <button type="button" class="btn btn-light col-sm-1">Close</button>
        </div>
    </div>
</header>

<body>
    <h2 class="text-center p-2">Employee Login</h2>
    <form class="p-3 bg-light" style="max-width: 400px; margin: auto;">

        <div class="form-group mb-2">
            <label for="email">Email address:</label>
            <input type="email" class="form-control" id="email" autocomplete="off">
        </div>

        <div class="mb-3">
            <label for="pwd">Password:</label>
            <input type="password" class="form-control" id="pwd">
        </div>

        <label class="form-label">Account Type:</label>

        <div class="form-check mb-1">
            <input class="form-check-input" type="radio" name="userType" id="employee" value="employee" checked>
            <label class="form-check-label" for="employee">Employee</label>
        </div>

        <div class="form-check mb-3">
            <input class="form-check-input" type="radio" name="userType" id="admin" value="admin">
            <label class="form-check-label" for="admin">Admin</label>
        </div>

        <button type="submit" class="btn btn-primary">Submit</button>
    </form>

</body>

</html>
