<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>ABC</title>
</head>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

<header>
    <div class="container-fluid bg-primary text-white">
        <div class="row p-4 align-items-center">
            <img src="images/ABCLogo.png" class="img-thumbnail rounded col-sm-2" style="max-width: 100px;">
            <h2 class="col-lg-9">ABC Company</h2>
            <button type="button" class="btn btn-light col-sm-1">Close</button>
        </div>
    </div>
</header>

<body>
    <h1 class="text-center py-3">Employee Information</h1>
    <form class="p-3 bg-light" style="max-width: 600px; margin: auto;">

        <div class="form-floating mb-3">
            <input type="textarea" class="form-control" id="fname" placeholder="First Name">
            <label for="fname">First Name</label>
        </div>

        <div class="form-floating mb-3">
            <input type="textarea" class="form-control" id="lname" placeholder="Last Name">
            <label for="lname">Last Name</label>
        </div>

        <label class="form-label">Status:</label>

        <div class="form-check form-check-inline ms-2">
            <input class="form-check-input" type="radio" name="status" id="active" value="active" checked>
            <label class="form-check-label" for="active">Active</label>
        </div>

        <div class="form-check form-check-inline mb-3">
            <input class="form-check-input" type="radio" name="status" id="terminated" value="terminated">
            <label class="form-check-label" for="terminated">Terminated</label>
        </div>

        <div>
            <label for="department" class="form-label">Department:</label>
            <select class="form-select mb-3" id="department">
                <option value="hr">HR</option>
                <option value="maintenance">Maintenance</option>
                <option value="laborer">Laborer</option>
                <option value="management">Management</option>
            </select>
        </div>

        <div class="form-floating mb-3">
            <input type="textarea" class="form-control" id="title" placeholder="Job Title">
            <label for="title">Job Title</label>
        </div>

        <div class="form-floating mb-2">
            <input type="date" class="form-control" id="dob" placeholder="" min="1900-01-01" max="2008-05-02">
            <label for="dob">Date of Birth</label>
        </div>

        <div class="mb-2">
            <label class="form-label">Gender:</label>

            <div class="form-check form-check-inline ms-2">
                <input class="form-check-input" type="radio" name="gender" id="male" value="male" checked>
                <label class="form-check-label" for="male">Male</label>
            </div>

            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="gender" id="female" value="female">
                <label class="form-check-label" for="female">Female</label>
            </div>
        </div>

        <div class="mb-2">
            <label class="form-label">Pay Type:</label>

            <div class="form-check form-check-inline ms-2">
                <input class="form-check-input" type="radio" name="payType" id="hourly" value="hourly" checked>
                <label class="form-check-label" for="hourly">Hourly</label>
            </div>

            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="payType" id="salary" value="salary">
                <label class="form-check-label" for="salary">Salary</label>
            </div>
        </div>

        <div class="form-floating mb-3">
            <input type="email" class="form-control" id="email" placeholder="">
            <label for="email">Email</label>
        </div>

        <div class="form-floating mb-3">
            <input type="textarea" class="form-control" id="address" placeholder="123 W. Main">
            <label for="address">Address</label>
        </div>

        <div class="form-floating mb-3">
            <input type="textarea" class="form-control" id="zip" placeholder="" maxlength="5">
            <label for="zip">Zip Code</label>
        </div>

        <div class="d-flex justify-content-center">
            <button type="submit" class="btn btn-primary">Submit</button>
        </div>

    </form>

</body>

</html>
